<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agent-context | Codebase Graph</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #121212;
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    #graph-container {
      flex: 1;
      position: relative;
      background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 0);
      background-size: 24px 24px;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e293b;
      border-top-color: #4E79A7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-overlay span {
      font-size: 13px;
      color: #94a3b8;
      letter-spacing: 0.03em;
    }

    #sidebar {
      width: 280px;
      background: rgba(24, 24, 27, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.4);
    }

    #search-wrap {
      padding: 12px;
      border-bottom: 1px solid #2a2a4e;
    }

    #search {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #3a3a5e;
      color: #e0e0e0;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    #search:focus {
      border-color: #4E79A7;
    }

    #search-results {
      max-height: 160px;
      overflow-y: auto;
      padding: 4px 12px;
      border-bottom: 1px solid #2a2a4e;
      display: none;
    }

    .search-item {
      padding: 5px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
    }

    .search-item:hover {
      background: #2a2a4e;
    }

    #info-panel {
      padding: 14px;
      border-bottom: 1px solid #2a2a4e;
      min-height: 130px;
    }

    #info-panel h3 {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    #info-content {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.7;
    }

    #info-content .field {
      margin-bottom: 3px;
    }

    #info-content .field b {
      color: #f1f5f9;
      font-weight: 500;
    }

    #info-content .empty {
      color: #475569;
      font-style: italic;
      font-size: 12px;
    }

    .neighbor-link {
      display: inline-block;
      padding: 2px 8px;
      margin: 2px 3px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
      background: #1e293b;
      color: #94a3b8;
      transition: background 0.15s, color 0.15s;
    }

    .neighbor-link:hover {
      background: #334155;
      color: #e2e8f0;
    }

    #neighbors-list {
      max-height: 120px;
      overflow-y: auto;
      margin-top: 6px;
    }

    #legend-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    #legend-wrap h3 {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 4px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      transition: background 0.15s;
    }

    .legend-item:hover {
      background: #2a2a4e;
    }

    .legend-item.dimmed {
      opacity: 0.3;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #cbd5e1;
    }

    .legend-count {
      color: #475569;
      font-size: 11px;
      font-weight: 500;
    }

    #stats {
      padding: 10px 14px;
      border-top: 1px solid #2a2a4e;
      font-size: 11px;
      color: #475569;
      letter-spacing: 0.02em;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }
  </style>
</head>

<body>
  <div id="graph-container">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span>Computing layout&hellip;</span>
    </div>
  </div>

  <div id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search nodes&hellip;" autocomplete="off">
      <div id="search-results"></div>
    </div>
    <div id="info-panel">
      <h3>Node Info</h3>
      <div id="info-content"><span class="empty">Click a node to inspect</span></div>
    </div>
    <div id="legend-wrap">
      <h3>Modules</h3>
      <div id="legend"></div>
    </div>
    <div id="stats"></div>
  </div>

  <script>
    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function boot() {
      const overlay = document.getElementById('loading-overlay');

      // 1. Fetch graph data
      const res = await fetch('./graph.json');
      if (!res.ok) throw new Error('Failed to load graph.json');
      const data = await res.json();

      // 2. Compute degree for every node from edges
      const degree = {};
      for (const e of data.edges) {
        degree[e.source] = (degree[e.source] || 0) + 1;
        degree[e.target] = (degree[e.target] || 0) + 1;
      }

      // 3. Convert nodes to vis-network format
      const rawNodes = data.nodes.map(n => {
        const a = n.attributes;
        const id = n.key;
        const isEntity = ['entity', 'class', 'function'].includes(a.kind);
        const isExternal = a.external;
        const deg = degree[id] || 0;
        const color = a.color || '#94a3b8';

        let size;
        let fontSize;
        if (isEntity) {
          size = 5;
          fontSize = 0;
        } else if (isExternal) {
          size = 8;
          fontSize = 10;
        } else {
          size = Math.max(10, Math.min(25, deg * 3 + 5));
          fontSize = 12;
        }

        const label = a.label || (isExternal ? id : id.split(/[/\\]/).pop());

        return {
          id,
          label,
          size,
          font: { size: fontSize, color: '#ffffff', face: 'Inter, sans-serif' },
          color: { background: color, border: color },
          borderWidth: isEntity ? 0 : 1,
          _kind: isEntity ? a.kind : (isExternal ? 'external' : 'file'),
          _community: a.community || 'other',
          _language: a.language || '',
          _degree: deg,
        };
      });

      // 4. Convert edges — inherit color from source node
      const nodeColorMap = {};
      for (const n of rawNodes) {
        nodeColorMap[n.id] = n.color.background;
      }

      const rawEdges = data.edges.map((e, i) => {
        const isContains = e.attributes.relation === 'contains';
        const srcColor = nodeColorMap[e.source] || '#64748b';
        return {
          id: i,
          from: e.source,
          to: e.target,
          title: isContains ? 'contains' : (e.attributes.relationship || 'imports'),
          dashes: isContains,
          width: isContains ? 1 : 2,
          color: { color: srcColor, opacity: 0.55 },
          smooth: { type: 'continuous', roundness: 0.2 },
          arrows: { to: { enabled: true, scaleFactor: 0.5 } },
        };
      });

      // 5. Build DataSets
      const nodesDS = new vis.DataSet(rawNodes);
      const edgesDS = new vis.DataSet(rawEdges);

      // 6. Compute stats
      let fileCount = 0, classCount = 0, funcCount = 0, entityCount = 0;
      const communityMap = new Map();
      for (const n of rawNodes) {
        if (n._kind === 'class') classCount++;
        else if (n._kind === 'function') funcCount++;
        else if (n._kind === 'entity') entityCount++;
        else if (n._kind === 'file') fileCount++;
        const c = n._community;
        if (!communityMap.has(c)) {
          communityMap.set(c, { color: n.color.background, count: 0, nodeIds: [] });
        }
        const entry = communityMap.get(c);
        entry.count++;
        entry.nodeIds.push(n.id);
      }

      // 7. Create network
      const container = document.getElementById('graph-container');
      const network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, {
        physics: {
          enabled: true,
          solver: 'forceAtlas2Based',
          forceAtlas2Based: {
            gravitationalConstant: -60,
            centralGravity: 0.005,
            springLength: 150,
            springConstant: 0.08,
            damping: 0.4,
            avoidOverlap: 0.8,
          },
          stabilization: { iterations: 200, fit: true },
        },
        interaction: {
          hover: true,
          tooltipDelay: 100,
          hideEdgesOnDrag: true,
          navigationButtons: false,
          keyboard: false,
        },
        nodes: { shape: 'dot', borderWidth: 1 },
        edges: { smooth: { type: 'continuous', roundness: 0.2 } },
      });

      // 8. Freeze physics after stabilization
      network.once('stabilizationIterationsDone', () => {
        network.setOptions({ physics: { enabled: false } });
      });

      // 9. Hide loading overlay
      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 600);

      // 10. Track hover for click detection
      let hoveredNodeId = null;

      network.on('hoverNode', params => {
        hoveredNodeId = params.node;
        container.style.cursor = 'pointer';
        const nd = nodesDS.get(params.node);
        if (nd && ['entity', 'class', 'function'].includes(nd._kind)) {
          nodesDS.update({ id: params.node, font: { size: 10, color: '#ffffff', face: 'Inter, sans-serif' } });
        }
      });
      network.on('blurNode', () => {
        if (hoveredNodeId) {
          const nd = nodesDS.get(hoveredNodeId);
          if (nd && ['entity', 'class', 'function'].includes(nd._kind)) {
            nodesDS.update({ id: hoveredNodeId, font: { size: 0 } });
          }
        }
        hoveredNodeId = null;
        container.style.cursor = 'default';
      });

      // 11. Click — show info (use hoveredNode for reliable detection)
      container.addEventListener('click', () => {
        if (hoveredNodeId !== null) {
          showInfo(hoveredNodeId);
          network.selectNodes([hoveredNodeId]);
        }
      });
      network.on('click', params => {
        if (params.nodes.length > 0) {
          showInfo(params.nodes[0]);
        } else if (hoveredNodeId === null) {
          document.getElementById('info-content').innerHTML = '<span class="empty">Click a node to inspect</span>';
        }
      });

      // 12. Search
      const searchInput = document.getElementById('search');
      const searchResults = document.getElementById('search-results');
      const allNodeLabels = rawNodes.map(n => ({ id: n.id, label: n.label, color: n.color.background }));

      searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase().trim();
        searchResults.innerHTML = '';
        if (!q) { searchResults.style.display = 'none'; return; }
        const matches = allNodeLabels.filter(n => n.label.toLowerCase().includes(q)).slice(0, 15);
        if (!matches.length) { searchResults.style.display = 'none'; return; }
        searchResults.style.display = 'block';
        matches.forEach(n => {
          const el = document.createElement('div');
          el.className = 'search-item';
          el.textContent = n.label;
          el.style.borderLeft = '3px solid ' + n.color;
          el.style.paddingLeft = '8px';
          el.onclick = () => {
            network.focus(n.id, { scale: 1.4, animation: true });
            network.selectNodes([n.id]);
            showInfo(n.id);
            searchResults.style.display = 'none';
            searchInput.value = '';
          };
          searchResults.appendChild(el);
        });
      });

      document.addEventListener('click', e => {
        if (!searchResults.contains(e.target) && e.target !== searchInput)
          searchResults.style.display = 'none';
      });

      // 13. Legend
      const legendEl = document.getElementById('legend');
      const hiddenCommunities = new Set();

      const sortedKeys = [...communityMap.keys()].sort((a, b) => {
        if (a === 'entities') return 1;
        if (b === 'entities') return -1;
        if (a === 'dependencies') return 1;
        if (b === 'dependencies') return -1;
        return a.localeCompare(b);
      });

      sortedKeys.forEach(key => {
        const info = communityMap.get(key);
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML =
          '<div class="legend-dot" style="background:' + esc(info.color) + '"></div>' +
          '<span class="legend-label">' + esc(key) + '</span>' +
          '<span class="legend-count">' + info.count + '</span>';

        item.onclick = () => {
          const isHidden = hiddenCommunities.has(key);
          if (isHidden) {
            hiddenCommunities.delete(key);
            item.classList.remove('dimmed');
          } else {
            hiddenCommunities.add(key);
            item.classList.add('dimmed');
          }
          const update = info.nodeIds.map(nid => ({ id: nid, hidden: !isHidden }));
          nodesDS.update(update);
        };

        legendEl.appendChild(item);
      });

      const totalEntities = classCount + funcCount + entityCount;
      document.getElementById('stats').textContent =
        fileCount + ' files \u00B7 ' + totalEntities + ' entities (' + classCount + ' classes, ' + funcCount + ' functions) \u00B7 ' + rawEdges.length + ' edges \u00B7 ' + communityMap.size + ' modules';

      // 14. Info panel
      function showInfo(nodeId) {
        const n = nodesDS.get(nodeId);
        if (!n) return;
        const neighborIds = network.getConnectedNodes(nodeId);
        const neighborHtml = neighborIds.map(nid => {
          const nb = nodesDS.get(nid);
          const label = nb ? nb.label : nid;
          const color = nb ? nb.color.background : '#555';
          return '<span class="neighbor-link" style="border-left:3px solid ' + esc(color) + '" data-nid="' + esc(nid) + '">' + esc(label) + '</span>';
        }).join('');

        let extra = '';
        let moduleLabel = esc(n._community || '-');
        if (['entity', 'class', 'function'].includes(n._kind)) {
          const sepIdx = nodeId.lastIndexOf('::');
          const parentFile = sepIdx !== -1 ? nodeId.slice(0, sepIdx) : nodeId;
          moduleLabel = 'entities';
          extra = '<div class="field">Defined in: ' + esc(parentFile) + '</div>';
        }

        document.getElementById('info-content').innerHTML =
          '<div class="field"><b>' + esc(n.label) + '</b></div>' +
          '<div class="field">Module: ' + moduleLabel + '</div>' +
          extra +
          '<div class="field">Connections: ' + neighborIds.length + '</div>' +
          (neighborIds.length
            ? '<div style="margin-top:8px;color:#64748b;font-size:11px">Neighbors</div><div id="neighbors-list">' + neighborHtml + '</div>'
            : '');

        document.querySelectorAll('.neighbor-link').forEach(el => {
          el.onclick = () => {
            const nid = el.dataset.nid;
            network.focus(nid, { scale: 1.4, animation: true });
            network.selectNodes([nid]);
            showInfo(nid);
          };
        });
      }
    }

    boot().catch(err => {
      console.error('Graph boot error:', err);
      document.getElementById('loading-overlay').innerHTML =
        '<span style="color:#ef4444">Error loading graph: ' + err.message + '</span>';
    });
  </script>
</body>

</html>
